site_name: tempest-express-sdk
site_description: Blocos compartilhados Express + Zod + tempest-db-js — porte Node.js do tempest-fastapi-sdk.
site_url: https://mauriciobenjamin700.github.io/tempest-express-sdk/
repo_url: https://github.com/mauriciobenjamin700/tempest-express-sdk
repo_name: mauriciobenjamin700/tempest-express-sdk

theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Alternar para o modo claro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Alternar para o modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Alternar para o modo automático
  features:
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  # PT-BR é o default; traduções vivem em `<nome>.en.md` e caem para o PT
  # quando ausentes. Seletor de idioma no header.
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: pt
          name: Português (BR)
          default: true
          build: true
        - locale: en
          name: English (US)
          build: true
          site_name: tempest-express-sdk
          nav_translations:
            Início: Home
            "Começando do zero": "Getting started from zero"
            "Instalando o Node.js": "Installing Node.js"
            "Essenciais de JavaScript e TypeScript": "JavaScript and TypeScript essentials"
            "Seu primeiro app": "Your first app"
            "Glossário": "Glossary"
            Instalação: Installation
            Tutorial: Tutorial
            "Projeto guiado": "Guided project"
            "Lista de Tarefas": "Task list API"
            "1. Setup e o primeiro modelo": "1. Setup and the first model"
            "2. CRUD completo": "2. Full CRUD"
            "3. Polimento: erros e filtros": "3. Polish: errors and filters"
            Receitas: Recipes
            "Configuração (settings tipados)": "Configuration (typed settings)"
            "Banco de dados (models + repositories)": "Database (models + repositories)"
            "Banco de dados avançado": "Advanced database"
            "Autenticação (JWT)": "Authentication (JWT)"
            "Utilidades BR": "BR utilities"
            "Tempo real (WebSocket + SSE)": "Real-time (WebSocket + SSE)"
            "Cache, fila e tarefas": "Cache, queue and tasks"
            "Feature flags e storage": "Feature flags and storage"
            "Campos validados e paginação": "Validated fields and pagination"
            "MFA, HTTP client, Web Push e mais": "MFA, HTTP client, Web Push and more"
            "Endurecimento HTTP (middlewares)": "HTTP hardening (middlewares)"
            "OAuth, webhooks e meta endpoints": "OAuth, webhooks and meta endpoints"
            "Downloads e logs em arquivo": "File downloads and logs"
            "Testes (banco em memória)": "Testing (in-memory database)"
            "Integrações: WhatsApp (zap-api)": "Integrations: WhatsApp (zap-api)"
            "Integrações: SMS e Telegram": "Integrations: SMS and Telegram"
            "Admin (API JSON)": "Admin (JSON API)"
            Roadmap: Roadmap
            Changelog: Changelog

nav:
  - Início: index.md
  - Começando do zero:
      - "Instalando o Node.js": getting-started/node.md
      - "Essenciais de JavaScript e TypeScript": getting-started/javascript.md
      - "Seu primeiro app": getting-started/first-app.md
      - "Glossário": getting-started/glossary.md
  - Instalação: installation.md
  - Tutorial: tutorial.md
  - Projeto guiado:
      - "Lista de Tarefas": learn/index.md
      - "1. Setup e o primeiro modelo": learn/01-setup.md
      - "2. CRUD completo": learn/02-crud.md
      - "3. Polimento: erros e filtros": learn/03-polish.md
  - Receitas:
      - "Configuração (settings tipados)": recipes/settings.md
      - "Banco de dados (models + repositories)": recipes/database.md
      - "Banco de dados avançado": recipes/database-advanced.md
      - "Autenticação (JWT)": recipes/auth.md
      - "Utilidades BR": recipes/br-utils.md
      - "Tempo real (WebSocket + SSE)": recipes/realtime.md
      - "Cache, fila e tarefas": recipes/jobs.md
      - "Feature flags e storage": recipes/flags-storage.md
      - "Campos validados e paginação": recipes/fields.md
      - "MFA, HTTP client, Web Push e mais": recipes/server-utils.md
      - "Endurecimento HTTP (middlewares)": recipes/hardening.md
      - "OAuth, webhooks e meta endpoints": recipes/oauth-webhooks.md
      - "Downloads e logs em arquivo": recipes/downloads-logs.md
      - "Testes (banco em memória)": recipes/testing.md
      - "Integrações: WhatsApp (zap-api)": recipes/whatsapp.md
      - "Integrações: SMS e Telegram": recipes/sms-telegram.md
      - "Admin (API JSON)": recipes/admin.md
  - Roadmap: roadmap.md
  - Changelog: changelog.md
